<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <title>Civico</title>
  <meta name="robots" content="noindex">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&display=swap">
  <style>
    html, body {
      margin: 0;
      min-height: 100dvh;
      background: #0F1115;
      color: #F4F2EE;
      font-family: 'Manrope', -apple-system, system-ui, sans-serif;
    }
    body { display: grid; place-items: center; padding: 24px; }
    .stage {
      max-width: 360px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    .logo { position: relative; width: 44px; height: 44px; margin-bottom: 6px; }
    .block { position: absolute; border-radius: 4px; }
    .b1 { left: 0;   bottom: 0;  width: 18px; height: 28px; background: #F5A524; }
    .b2 { left: 16px; bottom: 0; width: 18px; height: 18px; background: #F4F2EE; }
    .b3 { left: 28px; bottom: 16px; width: 18px; height: 28px; background: #3FB984; opacity: .85; }
    h1 { font-weight: 800; font-size: 22px; margin: 0; letter-spacing: -0.4px; }
    p { color: rgba(244,242,238,0.6); font-size: 14px; margin: 0; line-height: 1.5; }
    a.home-link {
      margin-top: 14px;
      padding: 12px 20px;
      border-radius: 14px;
      background: #F5A524;
      color: #0F1115;
      font-weight: 700;
      text-decoration: none;
      font-size: 14px;
    }
  </style>
  <script>
    // SPA fallback per GitHub Pages con routing a path location (no #).
    // Quando un URL non esiste sul filesystem (es. /civico-app/detail/1),
    // Pages serve questo 404.html: noi salviamo il path originale in
    // sessionStorage e redirezioniamo all'index.html. Lo script di
    // ripristino in src/index.html lo riapplica via history.replaceState
    // prima del bootstrap Angular.
    (function () {
      var BASE = '/civico-app/';
      var path = location.pathname + location.search + location.hash;
      try {
        sessionStorage.setItem('civico-redirect', path);
      } catch (e) {
        // sessionStorage non disponibile: redirect "secco" alla home.
      }
      location.replace(BASE);
    })();
  </script>
</head>
<body>
  <div class="stage">
    <span class="logo">
      <span class="block b1"></span>
      <span class="block b2"></span>
      <span class="block b3"></span>
    </span>
    <h1>Civico</h1>
    <p>La pagina che cerchi non esiste, ti riportiamo alla home.</p>
    <p>Se non vedi il reindirizzamento, JavaScript e' disabilitato.</p>
    <a class="home-link" href="/civico-app/">Torna alla home</a>
  </div>
</body>
</html>
