<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <title>Civico</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0F1115">
  <meta name="description" content="Civico: segnalazioni urbane dalla gente, per la gente.">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    // Ripristino SPA fallback (vedi public/404.html). Su GitHub Pages il refresh
    // diretto su una route deep (es. /civico-app/detail/1) serve il 404.html,
    // che salva il path in sessionStorage e redirige alla home. Qui lo
    // riapplichiamo via history.replaceState prima del bootstrap Angular.
    (function () {
      try {
        var saved = sessionStorage.getItem('civico-redirect');
        if (saved) {
          sessionStorage.removeItem('civico-redirect');
          history.replaceState(null, '', saved);
        }
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <app-root></app-root>
  <script>
    // Registrazione service worker (PWA installable). Skip su localhost per
    // non interferire col live reload di ng serve.
    if ('serviceWorker' in navigator &&
        location.hostname !== 'localhost' &&
        location.hostname !== '127.0.0.1') {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').catch(function () {});
      });
    }
  </script>
</body>
</html>
